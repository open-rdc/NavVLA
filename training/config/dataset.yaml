image_size: [96, 96]
context_type: temporal
normalize: true
clip_model: ViT-B/32

datasets:
  navvla_test:
    data_folder: /home/orne/kasai_ws/src/NavVLA/training/dataset/navvla_20260515_111925
    train_ratio: 0.7
    end_slack: 3 # because many trajectories end in collisions
    goals_per_obs: 1 # how many goals are sampled per observation
    waypoint_spacing: 1
    modality_id: 6

# modality flags (pose/image/language) are derived automatically from modality_id
# 0: satellite only
# 1: pose and satellite
# 2: satellite and image
# 3: all
# 4: pose only
# 5: pose and image
# 6: image only
# 7: language only
# 8: language and pose
