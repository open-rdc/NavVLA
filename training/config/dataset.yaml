image_size: [96, 96]
context_type: temporal
normalize: true
clip_model: ViT-B/32

datasets:
  tsudanuma_junction:
    data_folder: real/tsudanuma/navvla_tsudanuma_junction
    end_slack: 3
    goals_per_obs: 1
    waypoint_spacing: 1
    metric_waypoint_spacing: 0.17
    modality_id: 7

  tsudanuma_linestop:
    data_folder: real/tsudanuma/navvla_tsudanuma_linestop
    end_slack: 3
    goals_per_obs: 1
    waypoint_spacing: 1
    metric_waypoint_spacing: 0.17
    modality_id: 7

  tsudanuma_nav:
    data_folder: real/tsudanuma/navvla_tsudanuma_nav
    end_slack: 3
    goals_per_obs: 1
    waypoint_spacing: 1
    metric_waypoint_spacing: 0.17
    modality_id: 7

# modality flags (pose/image/language) are derived automatically from modality_id
# 0: satellite only
# 1: pose and satellite
# 2: satellite and image
# 3: all
# 4: pose only
# 5: pose and image
# 6: image only
# 7: language only
# 8: language and pose
