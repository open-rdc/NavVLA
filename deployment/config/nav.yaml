weights_path: deployment/weights/omnivla-edge_tsudanuma8.pth
model_type: omnivla-edge
context_size: 5
len_traj_pred: 8

interval_ms: 200
linear_max_vel: 0.5
angular_max_vel: 0.5
close_threshold: 1.0

modality_id: 7
# modality flags (pose/image/language) are derived automatically from modality_id
# 0: satellite only
# 1: pose and satellite
# 2: satellite and image
# 3: all
# 4: pose only
# 5: pose and image
# 6: image only
# 7: language only
# 8: language and pose

# Optional inference settings
waypoint_select: 4
metric_waypoint_spacing: 0.17
goal_pose: [10.0, -1.0, 0.0, -1.0]
goal_image_path: OmniVLA/inference/goal_img.jpg
path_frame_id: base_link
