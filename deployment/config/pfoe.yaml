# pfoe.yaml — PFoE + CLIP encoder node parameters
# Reference: ~/PFoE/src/pfoe_node.cpp defaults

pfoe_node:
  ros__parameters:
    episode_data_dir:  "data/sample"
    traj_name:         "episode01"

    num_particles:     1000    # cf. ParticleFilter pf(1000)
    weight_sum_thresh: 0.001   # cf. sum > 0.001
    retro_steps:       20      # cf. retrospectiveFilter(..., 20)
    backtrack:         1000    # cf. Episode episode(1000, 0.99)
    discount:          0.99    # cf. Episode episode(1000, 0.99)

clip_encoder_node:
  ros__parameters:
    clip_model: "ViT-B/32"
